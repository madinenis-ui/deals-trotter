<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dealstrotter</title>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #222;
    }
    h1 { color: #E63946; }
    code {
      background: #f4f4f4;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #params {
      background: #fff3f3;
      border: 1px solid #E63946;
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Dealstrotter</h1>
  <p>Dealstrotter is a personal automation project that finds and shares Amazon deals with a Telegram audience, and posts curated deal pins to Pinterest.</p>
  <p>This page also serves as the OAuth redirect endpoint for the project's Pinterest integration.</p>

  <div id="params">
    <strong>Authorization response:</strong>
    <p id="paramsText"></p>
  </div>

  <script>
    if (window.location.search) {
      document.getElementById('params').style.display = 'block';
      document.getElementById('paramsText').innerText = window.location.search;
    }
  </script>
</body>
</html>
